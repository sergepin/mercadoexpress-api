version: "3.9"

services:
  db:
    image: postgres:16
    container_name: mercadoexpress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-inventory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventory_pass}
      POSTGRES_DB: ${DB_NAME:-inventory_db}
    ports:
      - "5432:5432"
    volumes:
      - mercadoexpress_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inventory_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mercadoexpress-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-inventory_user}
      DB_PASSWORD: ${DB_PASSWORD:-inventory_pass}
      DB_NAME: ${DB_NAME:-inventory_db}
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:3000"
    command: sh -c "npm run migration:run && npm run seed && npm run start:prod"

volumes:
  mercadoexpress_pg_data: